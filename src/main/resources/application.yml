spring:
  application:
    name: gitlab-mcp
  main:
    banner-mode: off
    web-application-type: none
  ai:
    mcp:
      server:
        name: gitlab-mcp
        version: 0.1.0
        stdio: true
        type: SYNC
        annotation-scanner:
          enabled: true

logging:
  level:
    root: OFF

gitlab:
  url: ${GITLAB_URL:https://gitlab.com}
  token: ${GITLAB_TOKEN:}
  allowed-projects: ${GITLAB_ALLOWED_PROJECTS:}
  default-per-page: ${GITLAB_DEFAULT_PER_PAGE:20}
  max-per-page: ${GITLAB_MAX_PER_PAGE:100}
  max-jobs: ${GITLAB_MAX_JOBS:500}
  max-pipelines: ${GITLAB_MAX_PIPELINES:20}
  max-pipeline-depth: ${GITLAB_MAX_PIPELINE_DEPTH:3}
  token-file: ${GITLAB_TOKEN_FILE:}
  connect-timeout: ${GITLAB_CONNECT_TIMEOUT:10s}
  read-timeout: ${GITLAB_READ_TIMEOUT:60s}
  proxy-url: ${GITLAB_PROXY_URL:}
  ssl-bundle: ${GITLAB_SSL_BUNDLE:}
  temp-directory: ${GITLAB_TEMP_DIRECTORY:}
  max-download-bytes: ${GITLAB_MAX_DOWNLOAD_BYTES:100000000}
  retry-attempts: ${GITLAB_RETRY_ATTEMPTS:2}
  retry-backoff: ${GITLAB_RETRY_BACKOFF:500ms}
