name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  contribution-policy:
    name: Contribution policy
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Validate pull request metadata
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_BRANCH: ${{ github.head_ref }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: node .github/scripts/validate-pull-request.mjs
      - name: Reject merge commits
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          if git rev-list --merges "$BASE_SHA..HEAD" | grep --quiet .; then
            echo "::error::Pull request branches must not contain merge commits. Rebase the branch on main."
            git rev-list --merges --oneline "$BASE_SHA..HEAD"
            exit 1
          fi

  test:
    name: ${{ matrix.os }} / Java ${{ matrix.java }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
        java:
          - "21"
          - "25"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: maven
      - name: Verify
        if: runner.os != 'Windows'
        run: ./mvnw --batch-mode --no-transfer-progress verify
      - name: Verify
        if: runner.os == 'Windows'
        run: .\mvnw.cmd --batch-mode --no-transfer-progress verify

  docker:
    name: Docker linux/amd64 and linux/arm64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: false
          tags: gitlab-mcp:ci
